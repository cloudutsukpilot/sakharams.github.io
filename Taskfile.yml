version: "3"

# Updating Chirpy Theme
# https://www.richardn.ca/posts/UpdatingChirpy/

tasks:
  update:
    desc: Test and Push Changes
    cmds:
      - task: test-site
      - task: gp
  git-push:
    desc: git push with changes
    # git remote add gitlab git@gitlab.com:sakharamgit/cloudutsuk.git
    # git remote add github git@github.com:SakharamS/sakharams.github.io.git
    cmds:
      - git status
      - git add .
      - git commit -m "{{.CLI_ARGS}}"
      - git push origin main
      # - git push gitlab

  test-site:
    desc: test website
    cmds:
      - bundle exec htmlproofer _site --disable-external --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

  setup-local:
    desc: Install Ruby, Bundler, native build deps, and project gems (bundle install) for local development
    cmds:
      - |
        if command -v ruby >/dev/null 2>&1 && command -v bundle >/dev/null 2>&1; then
          echo "Ruby and Bundler are already installed:"
          ruby -v
          bundle -v
        else
          echo "Installing Ruby, Bundler, and native extension build dependencies..."
          sudo apt update
          sudo apt install -y ruby-full build-essential zlib1g-dev libffi-dev
          gem install bundler
        fi
      - |
        # Install gems to a user-writable path so `bundle install` never needs sudo
        GEM_USER_DIR="$HOME/.local/share/gem"
        bundle config set --local path "$GEM_USER_DIR"
        echo "Bundle install path set to $GEM_USER_DIR"
      - |
        RUBY_ABI_VERSION="$(ruby -e 'print RbConfig::CONFIG["ruby_version"]')"
        GEM_BIN_DIR="$HOME/.local/share/gem/ruby/${RUBY_ABI_VERSION}/bin"
        if ! grep -q "$GEM_BIN_DIR" ~/.bashrc 2>/dev/null; then
          echo "export PATH=\"$GEM_BIN_DIR:\$PATH\"" >> ~/.bashrc
          echo "Added $GEM_BIN_DIR to PATH in ~/.bashrc (run 'source ~/.bashrc' or restart your shell)."
        fi
      - bundle install
      - echo "Setup complete. Run 'task start-local' to start the server."

  start-local:
    desc: "Start Jekyll server in the background on a port and open it in the browser (override with: task start-local PORT=4001)"
    vars:
      PORT: '{{.PORT | default "4000"}}'
    cmds:
      - |
        if pgrep -f "jekyll serve" > /dev/null; then
          echo "Jekyll server is already running."
        else
          echo "Starting Jekyll server on port {{.PORT}} in the background..."
          JEKYLL_ENV=production nohup bundle exec jekyll serve --host 0.0.0.0 --port {{.PORT}} > /tmp/jekyll-server.log 2>&1 &
        fi
      - |
        URL="http://127.0.0.1:{{.PORT}}"
        echo "Waiting for Jekyll server to become ready at $URL (initial build can take ~60s)..."
        for i in $(seq 1 90); do
          if curl -s -o /dev/null "$URL"; then
            echo "Server is up."
            break
          fi
          sleep 1
        done
      - |
        URL="http://127.0.0.1:{{.PORT}}"
        if command -v xdg-open >/dev/null 2>&1; then
          xdg-open "$URL" >/dev/null 2>&1 &
        elif command -v wslview >/dev/null 2>&1; then
          wslview "$URL"
        elif command -v open >/dev/null 2>&1; then
          open "$URL"
        else
          echo "Open manually in your browser: $URL"
        fi
      - echo "Jekyll server running at http://127.0.0.1:{{.PORT}} (logs -> /tmp/jekyll-server.log). Stop with 'task stop-local'."

  stop-local:
    desc: Stop the background Jekyll server started by start-local
    cmds:
      - |
        if pgrep -f "jekyll serve" > /dev/null; then
          pkill -f "jekyll serve"
          echo "Jekyll server stopped."
        else
          echo "Jekyll server is not running."
        fi

  create-service:
    desc: "Create and configure the Jekyll service to start on boot"
    cmds:
      - |
        echo "[Unit]
        Description=Jekyll Server
        After=network.target

        [Service]
        Type=simplef
        User=sakharamshinde
        WorkingDirectory=/mnt/c/gitrepos/sakharams.github.io
        ExecStart=/usr/local/bin/bundle exec jekyll serve --host 0.0.0.0 --watch
        Environment="PATH=/home/sakharamshinde/gems/bin:/usr/local/bin:/usr/bin:/bin"
        Environment=GEM_HOME=/home/sakharamshinde/gems
        StandardOutput=append:/var/log/jekyll-output.log
        StandardError=append:/var/log/jekyll-error.log
        Restart=on-failure

        [Install]
        WantedBy=multi-user.target" | sudo tee /etc/systemd/system/jekyll.service
      - sudo chmod 644 /etc/systemd/system/jekyll.service
      - sudo systemctl daemon-reload
      - sudo systemctl enable jekyll.service
      - sudo systemctl start jekyll.service
      - sleep 5
      - sudo systemctl status jekyll.service

  delete-service:
    desc: "Delete the Jekyll service"
    cmds:
      - |
        if sudo systemctl is-active --quiet jekyll.service; then
          sudo systemctl stop jekyll.service
          sudo systemctl disable jekyll.service
          sudo rm /etc/systemd/system/jekyll.service
          sudo systemctl daemon-reload
          echo "Jekyll service has been deleted."
        else
          echo "Jekyll service is not running."
        fi
      - if [ -f /var/log/jekyll-output.log ]; then sudo rm /var/log/jekyll-output.log; fi
      - if [ -f /var/log/jekyll-error.log ]; then sudo rm /var/log/jekyll-error.log; fi

  recreate-service:
    desc: "Recreate the Jekyll service"
    cmds:
      - task: delete-service
      - task: create-service

  setup-logrotate:
    desc: "Setup logrotate for Jekyll logs"
    cmds:
      - echo "/var/log/jekyll.log {
        hourly
        rotate 24
        compress
        missingok
        notifempty
        create 644 sakharamshinde sakharamshinde
        sharedscripts
        postrotate
        systemctl restart jekyll.service > /dev/null 2>&1 || true
        endscript
        }" | sudo tee /etc/logrotate.d/jekyll > /dev/null

  add-alias:
    desc: "Add start/stop/logs aliases for the Jekyll background server to ~/.zshrc (override port with: task add-alias PORT=4001)"
    vars:
      PORT: '{{.PORT | default "4000"}}'
    cmds:
      # start-cloudutsuk: launches the site in the background (same approach as `task start-local`),
      # bound to this repo's absolute path at the time this task runs.
      - |
        REPO_DIR="$(pwd)"
        ALIAS_LINE="alias start-cloudutsuk='if pgrep -f \"jekyll serve\" > /dev/null; then echo \"Jekyll server is already running.\"; else cd $REPO_DIR && JEKYLL_ENV=production nohup bundle exec jekyll serve --host 0.0.0.0 --port {{.PORT}} > /tmp/jekyll-server.log 2>&1 & echo \"Jekyll server started at http://127.0.0.1:{{.PORT}} (logs: /tmp/jekyll-server.log).\"; fi'"
        if ! grep -qF "alias start-cloudutsuk" ~/.zshrc 2>/dev/null; then
          echo "$ALIAS_LINE" >> ~/.zshrc
          echo "Added alias start-cloudutsuk to ~/.zshrc."
        else
          echo "Alias start-cloudutsuk already exists in ~/.zshrc."
        fi
      - |
        ALIAS_LINE="alias logs-cloudutsuk='if [ -f /tmp/jekyll-server.log ]; then tail -f /tmp/jekyll-server.log; else echo \"Log file does not exist.\"; fi'"
        if ! grep -qF "alias logs-cloudutsuk" ~/.zshrc 2>/dev/null; then
          echo "$ALIAS_LINE" >> ~/.zshrc
          echo "Added alias logs-cloudutsuk to ~/.zshrc."
        else
          echo "Alias logs-cloudutsuk already exists in ~/.zshrc."
        fi
      - |
        ALIAS_LINE="alias clear-cloudutsuk-logs='if [ -f /tmp/jekyll-server.log ]; then : > /tmp/jekyll-server.log; echo \"Log file contents cleared.\"; else echo \"Log file does not exist.\"; fi'"
        if ! grep -qF "alias clear-cloudutsuk-logs" ~/.zshrc 2>/dev/null; then
          echo "$ALIAS_LINE" >> ~/.zshrc
          echo "Added alias clear-cloudutsuk-logs to ~/.zshrc."
        else
          echo "Alias clear-cloudutsuk-logs already exists in ~/.zshrc."
        fi
      - |
        ALIAS_LINE="alias stop-cloudutsuk='pkill -f \"jekyll serve\" && echo \"Jekyll server stopped.\" || echo \"Jekyll server is not running.\"'"
        if ! grep -qF "alias stop-cloudutsuk" ~/.zshrc 2>/dev/null; then
          echo "$ALIAS_LINE" >> ~/.zshrc
          echo "Added alias stop-cloudutsuk to ~/.zshrc."
        else
          echo "Alias stop-cloudutsuk already exists in ~/.zshrc."
        fi
      - 'echo "Run source ~/.zshrc or restart your shell, then use: start-cloudutsuk, logs-cloudutsuk, stop-cloudutsuk, clear-cloudutsuk-logs"'

  install-on-windows:
    desc: Install on Windows
    cmds:
      - |
        # https://jekyllrb.com/docs/installation/windows/
      - |
        gem install jekyll bundler
        # To install the requirements for the Jekyll theme
        bundle install
      - |
        # Create a Windows Service
        sc.exe create JekyllService binPath= '"C:\gitrepos\jekyllservice.bat"'
        sc.exe config JekyllService start= auto
        sc.exe start JekyllService
